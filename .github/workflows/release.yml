name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Pack & push to NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Derive version from tag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-manual.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Restore
        run: dotnet restore EasyTrading.slnx

      - name: Build
        run: dotnet build EasyTrading.slnx --no-restore --configuration Release -p:Version=${{ steps.ver.outputs.version }}

      - name: Test
        run: dotnet test EasyTrading.slnx --no-build --configuration Release

      - name: Pack
        run: dotnet pack EasyTrading.slnx --no-build --configuration Release -p:Version=${{ steps.ver.outputs.version }} --output ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-${{ steps.ver.outputs.version }}
          path: ./artifacts/*.nupkg

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::warning::NUGET_API_KEY secret not set; skipping push. Add it in repo Settings > Secrets > Actions."
            exit 0
          fi
          dotnet nuget push "./artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
