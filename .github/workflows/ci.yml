name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore EasyTrading.slnx

      - name: Build
        run: dotnet build EasyTrading.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test EasyTrading.slnx --no-build --configuration Release --logger "console;verbosity=normal"
